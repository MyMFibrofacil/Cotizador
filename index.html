<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cotizador Tola</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#1193d4",
            "background-dark": "#121212",
            "surface-dark": "#1e1e1e"
          },
          fontFamily: { display: ["Inter", "sans-serif"] }
        }
      }
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-background-dark text-gray-200 font-display">
  <div class="min-h-screen px-4 md:px-8 py-6 max-w-6xl mx-auto space-y-6">
    <header class="flex flex-wrap items-center justify-between gap-3">
      <div>
        <p class="text-sm text-gray-400">Cotizador de cajas con logo</p>
        <h1 class="text-2xl font-bold text-white">Cotizador Tola</h1>
      </div>
      <button id="btn-precios" class="rounded-lg h-10 px-4 bg-gray-700 text-white text-sm hover:bg-gray-600">Precios</button>
    </header>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <label class="flex flex-col">
        <span class="text-sm text-gray-300 mb-2">Fecha</span>
        <input id="inp-fecha" type="date" class="h-11 rounded-lg border-none bg-surface-dark"/>
      </label>
      <label class="flex flex-col">
        <span class="text-sm text-gray-300 mb-2">Cliente</span>
        <input id="inp-cliente" placeholder="Nombre del cliente" class="h-11 rounded-lg border-none bg-surface-dark"/>
      </label>
    </section>

    <section class="rounded-xl bg-surface-dark p-4 md:p-6 space-y-4">
      <h2 class="text-lg font-bold text-white">Modelos de caja por empresa</h2>
      <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
        <label class="md:col-span-4 flex flex-col">
          <span class="text-sm text-gray-300 mb-1">Empresa del logo</span>
          <input id="inp-empresa" class="h-11 rounded-lg border-gray-700 bg-gray-800"/>
        </label>
        <label class="md:col-span-4 flex flex-col">
          <span class="text-sm text-gray-300 mb-1">Tipo de caja</span>
          <select id="sel-modelo" class="h-11 rounded-lg border-gray-700 bg-gray-800"></select>
        </label>
        <label class="md:col-span-2 flex flex-col">
          <span class="text-sm text-gray-300 mb-1">Cantidad</span>
          <input id="inp-cantidad" type="number" min="1" value="1" class="h-11 rounded-lg border-gray-700 bg-gray-800"/>
        </label>
        <button id="btn-add-modelo" class="md:col-span-2 rounded-lg h-11 px-4 bg-primary text-white font-semibold">Agregar</button>
      </div>

      <div class="flex justify-end">
        <button id="btn-limpiar" class="rounded-lg h-9 px-3 border border-gray-600 text-xs hover:bg-gray-700">Limpiar pedido</button>
      </div>

      <div id="validation-warning" class="hidden rounded-lg border border-amber-500/50 bg-amber-500/10 text-amber-200 text-sm px-3 py-2"></div>

      <div id="lista-modelos" class="space-y-4"></div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <article class="rounded-xl bg-surface-dark p-5 space-y-3">
        <h3 class="text-white font-bold">Resumen costo interno</h3>
        <div id="resumen-items-costo" class="space-y-2"></div>
        <div class="border-t border-gray-700 pt-3 flex items-center justify-between">
          <span class="font-semibold">Total costo</span>
          <span id="total-costo" class="text-xl font-bold text-primary">$0</span>
        </div>
        <div class="flex justify-end">
          <button id="btn-pdf-costo" class="h-10 px-4 rounded-md border border-gray-600 text-sm hover:bg-gray-700">Crear PDF</button>
        </div>
      </article>

      <article class="rounded-xl bg-surface-dark p-5 space-y-3">
        <h3 class="text-white font-bold">Resumen consumidor final</h3>
        <div id="resumen-items-final" class="space-y-2"></div>
        <div class="border-t border-gray-700 pt-3 flex items-center justify-between">
          <span class="font-semibold">Total final (+<span id="lbl-margen">0</span>%)</span>
          <span id="total-final" class="text-xl font-bold text-primary">$0</span>
        </div>
        <div class="flex justify-end">
          <button id="btn-pdf-final" class="h-10 px-4 rounded-md border border-gray-600 text-sm hover:bg-gray-700">Crear PDF</button>
        </div>
      </article>
    </section>
  </div>

  <div id="modal-precios" class="hidden fixed inset-0 z-50 bg-black/70 p-4 overflow-y-auto">
    <div class="max-w-4xl mx-auto mt-6 mb-6 rounded-xl bg-surface-dark border border-gray-700 p-5 space-y-4 max-h-[calc(100vh-3rem)] overflow-y-auto">
      <div class="flex items-center justify-between gap-2">
        <h2 class="text-lg font-bold text-white">Configuración de precios</h2>
        <button id="btn-cerrar-precios" class="text-sm text-gray-300 hover:text-white">Cerrar</button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3">
        <label class="text-xs text-gray-300">Valor mm2
          <input id="inp-precio-mm2" type="number" step="0.0001" min="0" disabled class="mt-1 h-10 w-full rounded-md border border-gray-600 bg-gray-900 px-2 disabled:opacity-60 disabled:cursor-not-allowed"/>
        </label>
        <label class="text-xs text-gray-300">Area minima mm2
          <input id="inp-area-min" type="number" step="1" min="0" disabled class="mt-1 h-10 w-full rounded-md border border-gray-600 bg-gray-900 px-2 disabled:opacity-60 disabled:cursor-not-allowed"/>
        </label>
        <label class="text-xs text-gray-300">Factor QR
          <input id="inp-factor-qr" type="number" step="0.01" min="0" disabled class="mt-1 h-10 w-full rounded-md border border-gray-600 bg-gray-900 px-2 disabled:opacity-60 disabled:cursor-not-allowed"/>
        </label>
        <label class="text-xs text-gray-300">Margen cliente %
          <input id="inp-margen" type="number" step="0.1" class="mt-1 h-10 w-full rounded-md border border-gray-600 bg-gray-900 px-2"/>
        </label>
        <label class="text-xs text-gray-300">Desc. caja > 50 %
          <input id="inp-desc-mas50" type="number" step="0.1" min="0" class="mt-1 h-10 w-full rounded-md border border-gray-600 bg-gray-900 px-2"/>
        </label>
      </div>
      <div class="flex items-center justify-end gap-2">
        <span id="lbl-foto-pricing-lock" class="text-xs text-amber-300">Bloqueado: precios de foto</span>
      </div>

      <div class="rounded-lg border border-gray-700 p-3 space-y-3">
        <h3 class="font-semibold text-white">Precios por modelo</h3>
        <div class="grid grid-cols-1 md:grid-cols-12 gap-2 items-end">
          <label class="md:col-span-6 text-xs text-gray-300">Modelo
            <input id="inp-nuevo-modelo" class="mt-1 h-10 w-full rounded-md border border-gray-600 bg-gray-900 px-2" placeholder="ej: simple"/>
          </label>
          <label class="md:col-span-4 text-xs text-gray-300">Precio
            <input id="inp-nuevo-precio" type="number" min="0" step="1" class="mt-1 h-10 w-full rounded-md border border-gray-600 bg-gray-900 px-2"/>
          </label>
          <button id="btn-add-precio-modelo" type="button" class="md:col-span-2 h-10 rounded-md bg-gray-700 text-sm hover:bg-gray-600">Agregar</button>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="text-left text-xs text-gray-400">
              <tr>
                <th class="px-2 py-2">Modelo</th>
                <th class="px-2 py-2">Precio</th>
                <th class="px-2 py-2 text-right">Quitar</th>
              </tr>
            </thead>
            <tbody id="precios-modelos-rows"></tbody>
          </table>
        </div>
      </div>

      <div class="flex justify-end gap-2">
        <button id="btn-cancelar-precios" class="h-10 px-4 rounded-md border border-gray-600 text-sm">Cancelar</button>
        <button id="btn-guardar-precios" class="h-10 px-4 rounded-md bg-primary text-sm font-semibold">Guardar precios</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
